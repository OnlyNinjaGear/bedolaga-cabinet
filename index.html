<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#09090b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Loading...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <script>
      // Load Telegram Web App script only inside Telegram environment
      (function() {
        var isTelegram = window.TelegramWebviewProxy ||
          location.hash.indexOf('tgWebApp') !== -1 ||
          location.search.indexOf('tgWebApp') !== -1;
        if (isTelegram) {
          var s = document.createElement('script');
          s.src = 'https://telegram.org/js/telegram-web-app.js';
          s.async = true;
          document.head.appendChild(s);
        }
      })();
    </script>
    <style>
      body {
        background-color: var(--background, #09090b);
      }
    </style>
    <script>
      // Apply saved theme before React renders to prevent flash of wrong colors.
      // 1. Read user's dark/light preference from 'cabinet-theme' (set by useTheme.ts).
      //    Do NOT use html.classList — it's always 'dark' at startup in this file.
      // 2. Apply matching CSS vars from 'theme-vars' (written by ThemeConstructor).
      // 3. Sync the html class so React hydration finds the correct state.
      (function () {
        try {
          var theme = localStorage.getItem('cabinet-theme'); // 'dark' | 'light' | null
          var isDark = theme !== 'light'; // default to dark when not set
          var root = document.documentElement;

          // Sync class immediately so CSS :root / .dark rules match before paint
          if (isDark) {
            root.classList.add('dark');
          } else {
            root.classList.remove('dark');
          }

          // Apply custom theme CSS vars if ThemeConstructor has saved them
          var stored = localStorage.getItem('theme-vars');
          if (!stored) return;
          var data = JSON.parse(stored);
          var vars = isDark ? data.dark : data.light;
          if (!vars) return;
          for (var k in vars) root.style.setProperty('--' + k, vars[k]);
          if (data.radius) root.style.setProperty('--radius', data.radius);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
